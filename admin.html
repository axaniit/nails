<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b0b10">
  <title>Axani Nails — Admin</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .adminTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .adminTopActions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .adminGrid {
      display: grid;
      gap: 16px;
    }

    .requestCard {
      background: linear-gradient(180deg, rgba(18,18,32,0.98), rgba(18,18,32,0.92));
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
    }

    .requestHeader {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .requestHeader h2 {
      margin: 0;
      font-size: 1.15rem;
    }

    .metaGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      margin-top: 8px;
    }

    .metaItem {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
    }

    .metaLabel {
      display: block;
      font-size: 12px;
      color: #b9b9cc;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .metaValue {
      font-size: 14px;
      color: #f5f5fb;
      line-height: 1.45;
      word-break: break-word;
    }

    .requestActions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .denyBtn {
      background: rgba(255,255,255,0.04);
      color: #f5f5fb;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: none;
    }

    .denyBtn:hover {
      border-color: rgba(255,143,199,0.35);
    }

    .emptyState {
      text-align: center;
      padding: 36px 20px;
      color: #b9b9cc;
    }

    .hidden {
      display: none !important;
    }

    .statusPill {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,143,199,0.30);
      background: rgba(255,143,199,0.10);
      color: #ffb3da;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .loadingBox {
      padding: 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.03);
      color: #b9b9cc;
    }

    .actionPopupBackdrop,
    .resultPopupBackdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.58);
      z-index: 9998;
      padding: 18px;
      overflow: auto;
    }

    .actionPopupBackdrop.show,
    .resultPopupBackdrop.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .actionPopup,
    .resultPopup {
      width: min(620px, 100%);
      background: linear-gradient(180deg, rgba(18,18,32,0.98), rgba(18,18,32,0.92));
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
      overflow: hidden;
    }

    .actionPopupHeader,
    .resultPopupHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .actionPopupHeader h2,
    .resultPopupHeader h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .actionPopupBody,
    .resultPopupBody {
      padding: 18px;
    }

    .actionPopupFooter,
    .resultPopupFooter {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 0 18px 18px;
    }

    .popupCloseX {
      background: transparent;
      border: 0;
      color: #f5f5fb;
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      box-shadow: none;
    }

    .popupCloseX:hover {
      color: #ffb3da;
      transform: none;
    }

    .popupLabel {
      display: block;
      font-size: 13px;
      color: #b9b9cc;
      margin-bottom: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .popupTextarea {
      width: 100%;
      min-height: 130px;
      resize: vertical;
    }

    .popupHelp {
      color: #b9b9cc;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 10px;
    }

    .popupSummary {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .summaryChip {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,143,199,0.30);
      background: rgba(255,143,199,0.10);
      color: #ffb3da;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      width: fit-content;
    }

    .calendarBtn {
      background: #ff8fc7;
      color: #130612;
      border: none;
    }

    .calendarBtn:hover {
      background: #ffb3da;
    }

    .secondaryBtn {
      background: rgba(255,255,255,0.04);
      color: #f5f5fb;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: none;
    }

    .secondaryBtn:hover {
      border-color: rgba(255,143,199,0.35);
    }
  </style>
</head>
<body>
<header>
  <nav>
    <a href="index.html">Booking</a>
    <a href="gallery.html">Gallery</a>
    <a href="policies.html">Policies</a>
  </nav>
</header>

<main>
  <div class="adminTop">
    <div>
      <h1 style="margin:0 0 6px 0;">Admin Dashboard</h1>
      <p style="margin:0; color:#b9b9cc;">Review pending booking requests and approve or deny them.</p>
    </div>

    <div class="adminTopActions">
      <button class="secondary" id="refreshBtn">Refresh</button>
      <button class="secondary" id="logoutBtn">Log out</button>
    </div>
  </div>

  <div id="loadingBox" class="loadingBox">Loading pending requests...</div>

  <div id="emptyState" class="requestCard emptyState hidden">
    <p style="margin:0 0 8px 0; font-size:1.05rem; color:#f5f5fb;">No pending requests</p>
    <p style="margin:0;">When someone submits a booking request, it will show up here.</p>
  </div>

  <section id="requestsContainer" class="adminGrid"></section>
</main>

<div id="toast" class="toast"></div>

<div id="actionPopupBackdrop" class="actionPopupBackdrop" aria-hidden="true">
  <div class="actionPopup" role="dialog" aria-modal="true" aria-labelledby="actionPopupTitle">
    <div class="actionPopupHeader">
      <h2 id="actionPopupTitle">Review booking</h2>
      <button type="button" class="popupCloseX" id="actionPopupX" aria-label="Close">×</button>
    </div>

    <div class="actionPopupBody">
      <div class="popupSummary">
        <div id="actionPopupStatusChip" class="summaryChip">Approve</div>
        <div id="actionPopupBookingName" style="font-size:1.05rem; font-weight:800; color:#f5f5fb;">Booking request</div>
        <div id="actionPopupBookingTime" style="color:#b9b9cc; line-height:1.5;">—</div>
      </div>

      <label class="popupLabel" for="decisionNotes">Notes to include in the email</label>
      <textarea id="decisionNotes" class="popupTextarea" placeholder="Examples:
- approved for 2:30 PM
- please arrive with bare nails
- I’m unavailable at your requested time, but I can do 4 PM
